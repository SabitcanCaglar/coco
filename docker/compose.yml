version: "3.9"

services:
  # ── PostgreSQL — metadata, task queue, examination results ──
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coco_local}
      POSTGRES_DB: coco
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coco"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis — task queue, pub/sub, worker state ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Ollama — local LLM, embedding ──
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Ollama model puller — on startup pull required models ──
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull deepseek-coder-v2:16b
        ollama pull nomic-embed-text
        echo "Models ready."
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  # ── Orchestrator — task routing, worker dispatch ──
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://coco:${POSTGRES_PASSWORD:-coco_local}@postgres:5432/coco
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - projects_data:/projects
    ports:
      - "3000:3000"

  # ── Worker template — scaled per project ──
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://coco:${POSTGRES_PASSWORD:-coco_local}@postgres:5432/coco
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      NODE_ENV: production
    volumes:
      - projects_data:/projects
    deploy:
      replicas: 2

  # ── Adminer — DB UI (dev only) ──
  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  projects_data:
