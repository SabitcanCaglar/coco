services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    restart: unless-stopped
    environment:
      COCO_BIND_HOST: 0.0.0.0
      COCO_HOME: /data
      COCO_MAX_CONCURRENCY: ${COCO_MAX_CONCURRENCY:-4}
      OLLAMA_URL: http://ollama:11434
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      COCO_OPENROUTER_MODEL: ${COCO_OPENROUTER_MODEL:-stepfun/step-3.5-flash:free}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../.docker-data/orchestrator:/data
      - ${HOME}:/host-home
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.telegram
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_started
    environment:
      COCO_DAEMON_URL: http://orchestrator:3000
      COCO_ENV_FILE: /workspace/.env
      COCO_HOME: /data
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      COCO_OPENROUTER_MODEL: ${COCO_OPENROUTER_MODEL:-stepfun/step-3.5-flash:free}
      COCO_MAX_CONCURRENCY: ${COCO_MAX_CONCURRENCY:-4}
    volumes:
      - ../.docker-data/telegram:/data
      - ..:/workspace:ro
      - ${HOME}:/host-home:ro
    profiles:
      - bot

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    profiles:
      - ollama

volumes:
  ollama_data:
